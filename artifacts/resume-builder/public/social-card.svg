<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3f51b5"/>
      <stop offset="100%" style="stop-color:#1a237e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circle top-right -->
  <circle cx="1050" cy="80" r="160" fill="white" opacity="0.05"/>
  <circle cx="1050" cy="80" r="110" fill="white" opacity="0.05"/>

  <!-- Decorative circle bottom-left -->
  <circle cx="150" cy="550" r="130" fill="white" opacity="0.05"/>

  <!-- Document icon background -->
  <rect x="80" y="175" width="140" height="180" rx="12" fill="url(#card)" stroke="white" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Document lines -->
  <rect x="102" y="215" width="96" height="8" rx="4" fill="white" opacity="0.6"/>
  <rect x="102" y="235" width="80" height="6" rx="3" fill="white" opacity="0.4"/>
  <rect x="102" y="253" width="88" height="6" rx="3" fill="white" opacity="0.4"/>
  <rect x="102" y="271" width="64" height="6" rx="3" fill="white" opacity="0.4"/>
  <rect x="102" y="295" width="96" height="6" rx="3" fill="white" opacity="0.3"/>
  <rect x="102" y="311" width="72" height="6" rx="3" fill="white" opacity="0.3"/>
  <!-- Check badge -->
  <circle cx="186" cy="338" r="18" fill="#43a047"/>
  <text x="186" y="344" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">✓</text>

  <!-- Main headline -->
  <text x="260" y="235" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1">ResumeCraft</text>

  <!-- Tagline -->
  <text x="260" y="295" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="white" opacity="0.9">Free ATS-Friendly Resume Builder</text>

  <!-- Description -->
  <text x="260" y="348" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="white" opacity="0.75">Build a professional resume in minutes.</text>
  <text x="260" y="378" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="white" opacity="0.75">Upload your existing resume or start from scratch.</text>

  <!-- Feature pills -->
  <rect x="260" y="420" width="190" height="44" rx="22" fill="white" opacity="0.15"/>
  <text x="355" y="447" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" font-weight="600">ATS Optimized</text>

  <rect x="468" y="420" width="190" height="44" rx="22" fill="white" opacity="0.15"/>
  <text x="563" y="447" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" font-weight="600">PDF Export</text>

  <rect x="676" y="420" width="210" height="44" rx="22" fill="white" opacity="0.15"/>
  <text x="781" y="447" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" font-weight="600">3 Templates</text>

  <!-- Bottom domain -->
  <text x="600" y="558" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" opacity="0.5">resumecraft.app</text>

  <!-- Divider line above domain -->
  <line x1="260" y1="540" x2="940" y2="540" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
</svg>
